<!DOCTYPE html>
<html lang="en" class="overflow-x-hidden">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MidnightBuilders | Learning Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(226, 232, 240, 0.8); }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .meet-disabled { pointer-events: none; opacity: 0.5; filter: grayscale(1); }
        .meet-enabled { pointer-events: auto; opacity: 1; filter: grayscale(0); }
    </style>
</head>
<body class="text-slate-900 min-h-screen w-full">

    <nav class="glass sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="resetToHome()">
                <div class="w-8 h-8 rounded-xl bg-indigo-600 flex items-center justify-center font-bold text-white shadow-lg shadow-indigo-200">M</div>
                <h1 class="text-lg font-bold tracking-tight text-slate-900">Midnight<span class="text-indigo-600">Builders</span></h1>
            </div>
            
            <div class="flex items-center gap-2">
                <input id="search-input" type="text" oninput="performSearch(this.value)" placeholder="Search..." class="bg-white border border-slate-200 rounded-full py-2 px-4 focus:outline-none focus:ring-2 focus:ring-indigo-100 transition-all text-sm w-24 sm:w-64 shadow-inner">
                <button onclick="checkAccess()" class="bg-slate-900 text-white px-4 py-2 rounded-full text-xs font-semibold hover:bg-slate-800 transition-all shadow-lg active:scale-95">Add</button>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 py-8">
        
        <!-- Home Wrapper: Everything here shows only on Home Screen -->
        <div id="home-wrapper" class="space-y-8">
            <div class="mb-4">
                <a id="meet-link" href="https://meet.google.com/cmv-bggm-itb" target="_blank" 
                   class="meet-disabled inline-flex items-center gap-2 bg-emerald-500 text-white px-5 py-3 rounded-2xl font-bold shadow-lg shadow-emerald-200 hover:bg-emerald-600 transition-all active:scale-95 text-sm w-full sm:w-auto justify-center">
                   <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M22 6.5l-5 4v-4l5 4zM2 6l10 5 10-5-10-5-10 5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                   JOIN LIVE SESSION
                </a>
            </div>

            <section id="performer-section">
                <div class="bg-slate-900 rounded-[2rem] p-6 sm:p-8 shadow-2xl flex flex-col md:flex-row items-start md:items-center justify-between gap-6">
                    <div>
                        <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-slate-800 text-slate-300 text-[10px] font-bold uppercase tracking-widest mb-3">
                            <span class="w-1.5 h-1.5 rounded-full bg-indigo-400 animate-pulse"></span>
                            Performer of the Day
                        </div>
                        <h2 class="text-2xl sm:text-3xl font-extrabold text-white tracking-tight">Excelent Performance</h2>
                    </div>
                    <div class="text-left md:text-right border-l-4 border-indigo-500 pl-4 md:border-l-0 md:pl-0">
                        <p class="text-slate-500 text-[10px] uppercase tracking-widest font-bold">Leader Board</p>
                        <p class="text-3xl font-black text-white">Sunitha</p>
                    </div>
                </div>
            </section>
        </div>

        <header class="mb-8 mt-8">
            <button id="breadcrumb" onclick="resetToHome()" class="hidden mb-4 flex items-center gap-1.5 text-indigo-600 font-semibold text-sm hover:translate-x-[-4px] transition-transform">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                Back
            </button>
            <div class="flex items-center justify-between gap-4">
                <h2 id="page-title" class="text-2xl sm:text-4xl font-extrabold text-slate-900 tracking-tight">Subject Library</h2>
                <div class="flex items-center gap-2">
                    <button onclick="openPunishmentsPrompt()" class="bg-gradient-to-r from-rose-500 to-red-600 text-white px-4 py-2 rounded-full font-bold text-xs sm:text-sm hover:from-rose-600 hover:to-red-700 transition-all shadow-lg shadow-rose-200 flex items-center gap-2 active:scale-95">
                        <svg class="w-3.5 h-3.5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                        Tasks
                    </button>
                    <button id="quiz-header-btn" onclick="showQuizSubjects()" class="bg-indigo-50 text-indigo-700 px-4 py-2 rounded-full font-bold text-xs sm:text-sm hover:bg-indigo-100 transition-all border border-indigo-100 flex items-center gap-2">
                        <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                        Quizzes
                    </button>
                </div>
            </div>
            <p id="page-subtitle" class="text-slate-500 mt-2 text-sm sm:text-lg">Select a category to browse materials.</p>
        </header>

        <div id="main-content" class="space-y-8 sm:space-y-12">
            <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                <div onclick="filterByCategory('Python')" class="card cursor-pointer bg-white p-3 sm:p-4 rounded-xl sm:rounded-2xl border border-slate-200 shadow-sm flex items-center gap-3">
                    <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-lg sm:rounded-xl bg-indigo-50 flex items-center justify-center text-indigo-600 font-bold text-xs shrink-0">PY</div>
                    <h3 class="text-xs sm:text-sm font-bold text-slate-900 truncate">Python</h3>
                </div>
                <div onclick="filterByCategory('DSA')" class="card cursor-pointer bg-white p-3 sm:p-4 rounded-xl sm:rounded-2xl border border-slate-200 shadow-sm flex items-center gap-3">
                    <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-lg sm:rounded-xl bg-emerald-50 flex items-center justify-center text-emerald-600 font-bold text-xs shrink-0">DS</div>
                    <h3 class="text-xs sm:text-sm font-bold text-slate-900 truncate">DSA</h3>
                </div>
                <div onclick="filterByCategory('Aptitude')" class="card cursor-pointer bg-white p-3 sm:p-4 rounded-xl sm:rounded-2xl border border-slate-200 shadow-sm flex items-center gap-3">
                    <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-lg sm:rounded-xl bg-orange-50 flex items-center justify-center text-orange-600 font-bold text-xs shrink-0">AT</div>
                    <h3 class="text-xs sm:text-sm font-bold text-slate-900 truncate">Aptitude</h3>
                </div>
                <div onclick="filterByCategory('Power BI')" class="card cursor-pointer bg-white p-3 sm:p-4 rounded-xl sm:rounded-2xl border border-slate-200 shadow-sm flex items-center gap-3">
                    <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-lg sm:rounded-xl bg-indigo-50 flex items-center justify-center text-indigo-600 font-bold text-xs shrink-0">PB</div>
                    <h3 class="text-xs sm:text-sm font-bold text-slate-900 truncate">Power BI</h3>
                </div>
                <div onclick="filterByCategory('ML')" class="card cursor-pointer bg-white p-3 sm:p-4 rounded-xl sm:rounded-2xl border border-slate-200 shadow-sm flex items-center gap-3">
                    <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-lg sm:rounded-xl bg-emerald-50 flex items-center justify-center text-emerald-600 font-bold text-xs shrink-0">ML</div>
                    <h3 class="text-xs sm:text-sm font-bold text-slate-900 truncate">ML</h3>
                </div>
                <div onclick="filterByCategory('AI')" class="card cursor-pointer bg-white p-3 sm:p-4 rounded-xl sm:rounded-2xl border border-slate-200 shadow-sm flex items-center gap-3">
                    <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-lg sm:rounded-xl bg-orange-50 flex items-center justify-center text-orange-600 font-bold text-xs shrink-0">AI</div>
                    <h3 class="text-xs sm:text-sm font-bold text-slate-900 truncate">AI</h3>
                </div>
            </div>
        </div>

        <div id="resource-grid" class="grid grid-cols-2 lg:grid-cols-3 gap-3 sm:gap-6"></div>
    </main>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-[60]">
        <div class="bg-white rounded-[2rem] p-6 sm:p-8 w-full max-w-sm sm:max-w-md shadow-2xl relative">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-400 hover:text-slate-900 transition">✕</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        let resources = JSON.parse(localStorage.getItem('hub_resources')) || [
            //PYTHON
            { title: "Day 1 - Python", url: "https://github.com/AdiMidnightLearners/Midnight-Learners/raw/main/day%201.pdf", category: "Python" },
            { title: "Day 2 - Python", url: "https://github.com/AdiMidnightLearners/Midnight-Learners/raw/main/day%202.pdf", category: "Python" },
            { title: "Day 3 - Python", url: "https://github.com/AdiMidnightLearners/Midnight-Learners/raw/main/day%203.pdf", category: "Python" },
            { title: "Day 4 - Python", url: "https://github.com/AdiMidnightLearners/Midnight-Learners/raw/main/day%204.pdf", category: "Python" },
            { title: "Day 5 - Python", url: "https://github.com/AdiMidnightLearners/Midnight-Learners/raw/main/day%205.pdf", category: "Python" },
            { title: "Day 6 - Python", url: "https://github.com/AdiMidnightLearners/Midnight-Learners/raw/main/day%206.pdf", category: "Python" },
            //DSA
            { title: "Day 1 - DSA", url: "https://github.com/AdiMidnightLearners/Midnight-Learners/raw/main/dsa%20day%201.pdf", category: "DSA" },
            { title: "Day 2 - DSA", url: "https://github.com/AdiMidnightLearners/Midnight-Learners/raw/main/DSA%20Day2.pdf", category: "DSA" },
            //APTITUDE
            { title: "Day 1 - Aptitude", url: "https://github.com/AdiMidnightLearners/Midnight-Learners/raw/main/Aptitude%20Day%205.pdf", category: "Aptitude" },
            //DSA QUIZ
            { title: "DSA Day 01 Quiz", url: "https://adimidnightlearners.github.io/Midnight-Learners/DAY%2001%20DSA%20QUIZ.html", category: "Quiz-DSA" },
            { title: "DSA Day 02 Quiz", url: "https://adimidnightlearners.github.io/Midnight-Learners/day_02_dsa_quiz.html", category: "Quiz-DSA" },
            //PYTHON QUIZ
            { title: "Python Day 01 Quiz", url: "https://adimidnightlearners.github.io/Midnight-Learners/PYTHON%20DAY%2001%20QUIZ.html", category: "Quiz-Python" },
            { title: "Python Day 02 Quiz", url: "https://adimidnightlearners.github.io/Midnight-Learners/PYTHON%20DAY%2002%20QUIZ.html", category: "Quiz-Python" },
            { title: "Python Day 03 Quiz", url: "https://adimidnightlearners.github.io/Midnight-Learners/PYTHON%20DAY%2003%20QUIZ.html", category: "Quiz-Python" },
            { title: "Python Day 04 Quiz", url: "https://adimidnightlearners.github.io/Midnight-Learners/PYTHON%20DAY%2004%20QUIZ.html", category: "Quiz-Python" },
            { title: "Python Day 05 Quiz", url: "https://adimidnightlearners.github.io/Midnight-Learners/PYTHON%20DAY%2005%20QUIZ.HTML", category: "Quiz-Python" },
            { title: "Python Day 06 Quiz", url: "https://adimidnightlearners.github.io/Midnight-Learners/PYTHON%20DAY%2006%20QUIZ.html", category: "Quiz-Python" }
        ];

        // Punishments Database with individual pass keys for Sunitha, Pranavi, Hasini, Kanchana
        const studentPunishments = {
            "sunitha": {
                name: "Sunitha",
                passkey: "799S",
                punishments: [
                    { subject: "Python", task: "Write a simple program to print 'Hello World' and add two numbers." },
                    { subject: "English Communication", task: "Write 3 basic sentences about your daily routine." }
                ]
            },
            "pranavi": {
                name: "Pranavi",
                passkey: "502P",
                punishments: [
                    { subject: "Python", task: "Write a basic program using an if-else statement to check if a number is positive." },
                    { subject: "English Communication", task: "Write 3 simple sentences introducing yourself." }
                ]
            },
            "hasini": {
                name: "Hasini",
                passkey: "623H",
                punishments: [
                    { subject: "Python", task: "Create a simple list of 3 fruits and print each one using a loop." },
                    { subject: "English Communication", task: "Write 3 simple sentences about your favorite hobby." }
                ]
            },
            "kanchana": {
                name: "Kanchana",
                passkey: "542K",
                punishments: [
                    { subject: "Python", task: "Write a simple function that takes a name and prints a greeting." },
                    { subject: "English Communication", task: "Write 3 basic sentences about your favorite food." }
                ]
            }
        };

        function checkSessionTime() {
            const now = new Date();
            const istTime = new Date(now.toLocaleString("en-US", {timeZone: "Asia/Kolkata"}));
            const hours = istTime.getHours();
            const minutes = istTime.getMinutes();
            
            const meetLink = document.getElementById('meet-link');
            
            // Logic: Enabled from 9:20 PM (21:20) until 11:00 PM (23:00)
            const isLive = (hours === 20 && minutes >= 00) || (hours === 22);

            if (isLive) {
                meetLink.classList.remove('meet-disabled');
                meetLink.classList.add('meet-enabled');
            } else {
                meetLink.classList.remove('meet-enabled');
                meetLink.classList.add('meet-disabled');
            }
        }
        setInterval(checkSessionTime, 60000);
        checkSessionTime();

        function saveResources() { localStorage.setItem('hub_resources', JSON.stringify(resources)); }
        
        function resetToHome() {
            document.getElementById('home-wrapper').classList.remove('hidden');
            document.getElementById('page-title').innerText = "Subject Library";
            document.getElementById('page-subtitle').innerText = "Select a category to browse materials.";
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('breadcrumb').classList.add('hidden');
            document.getElementById('resource-grid').innerHTML = '';
            document.getElementById('search-input').value = '';
            document.getElementById('quiz-header-btn').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }
        
        function performSearch(query) {
            document.getElementById('home-wrapper').classList.add('hidden');
            document.getElementById('quiz-header-btn').classList.add('hidden');
            const filtered = resources.filter(r => r.title.toLowerCase().includes(query.toLowerCase()));
            document.getElementById('main-content').classList.add('hidden');
            document.getElementById('breadcrumb').classList.remove('hidden');
            renderResources(filtered, "Search Results", `Found ${filtered.length} matches`);
        }

        function showQuizSubjects() {
            document.getElementById('home-wrapper').classList.add('hidden');
            document.getElementById('quiz-header-btn').classList.add('hidden');
            document.getElementById('main-content').classList.add('hidden');
            document.getElementById('breadcrumb').classList.remove('hidden');
            document.getElementById('page-title').innerText = "Quiz Subjects";
            document.getElementById('page-subtitle').innerText = "Select a subject to view its quizzes.";
            
            const subjects = ["Python", "DSA", "Aptitude", "Power BI", "ML", "AI"];
            const grid = document.getElementById('resource-grid');
            grid.innerHTML = subjects.map(s => `
                <div onclick="filterByCategory('Quiz-${s}')" class="card cursor-pointer bg-white p-6 rounded-2xl border border-slate-200 shadow-sm text-center">
                    <h3 class="font-bold text-lg">${s}</h3>
                </div>
            `).join('');
        }

        function filterByCategory(cat) {
            document.getElementById('home-wrapper').classList.add('hidden');
            document.getElementById('quiz-header-btn').classList.add('hidden');
            document.getElementById('main-content').classList.add('hidden');
            document.getElementById('breadcrumb').classList.remove('hidden');
            const filtered = resources.filter(r => r.category === cat);
            renderResources(filtered, cat.replace('Quiz-', ''), `Showing materials for ${cat.replace('Quiz-', '')}`);
        }

        function renderResources(items, title, subtitle) {
            document.getElementById('page-title').innerText = title;
            document.getElementById('page-subtitle').innerText = subtitle;
            const grid = document.getElementById('resource-grid');
            
            grid.innerHTML = items.length > 0 ? items.map(res => {
                const isPdf = res.url.toLowerCase().endsWith('.pdf');
                const targetUrl = isPdf ? `https://docs.google.com/viewer?url=${encodeURIComponent(res.url)}&embedded=true` : res.url;
                return `
                    <div class="card bg-white p-4 sm:p-6 rounded-2xl sm:rounded-3xl border border-slate-100 shadow-sm flex flex-col justify-between">
                        <div>
                            <span class="text-[9px] font-bold text-indigo-500 uppercase tracking-widest">${res.category.replace('Quiz-', '')}</span>
                            <h3 class="font-bold text-sm sm:text-lg mt-1 sm:mt-2 text-slate-900 line-clamp-2">${res.title}</h3>
                        </div>
                        <a href="${targetUrl}" target="_blank" class="mt-4 sm:mt-6 flex items-center gap-1 sm:gap-2 text-indigo-600 font-bold text-[10px] sm:text-xs uppercase tracking-wider hover:text-indigo-800 transition">
                            View →
                        </a>
                    </div>
                `;
            }).join('') : `<p class="col-span-full text-slate-500 py-12">No materials found in this category.</p>`;
        }

        function checkAccess() {
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal-content').innerHTML = `
                <div class="text-center mb-6">
                    <div class="w-12 h-12 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-3 shadow-inner font-bold text-lg">🔒</div>
                    <h3 class="text-xl font-extrabold text-slate-900">Access Restricted</h3>
                    <p class="text-xs text-slate-500 mt-1">Enter security credentials to add materials.</p>
                </div>
                <div class="space-y-4">
                    <input id="passkey" type="password" placeholder="Enter security key" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl text-slate-900 text-sm outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-all shadow-inner">
                    <button onclick="verifyKey()" class="w-full bg-slate-900 text-white py-3.5 rounded-2xl font-bold hover:bg-slate-800 transition shadow-lg active:scale-95 text-sm">Verify Key</button>
                </div>
            `;
        }

        function verifyKey() {
            if(document.getElementById('passkey').value === "adi105") {
                showAddForm();
            } else {
                const passInput = document.getElementById('passkey');
                passInput.value = "";
                passInput.placeholder = "Invalid Key! Try again";
                passInput.classList.add('border-red-300', 'bg-red-50');
            }
        }

        // Redesigned Student Punishments Section with Sleek UI & Interactive Cards
        function openPunishmentsPrompt() {
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal-content').innerHTML = `
                <div class="text-center mb-6">
                    <div class="w-12 h-12 bg-rose-50 text-rose-600 rounded-2xl flex items-center justify-center mx-auto mb-3 shadow-inner font-bold text-lg">⚡</div>
                    <h3 class="text-xl font-extrabold text-slate-900">Student Punishments Portal</h3>
                    <p class="text-xs text-slate-500 mt-1">Select your name and enter your assigned pass key to view tasks.</p>
                </div>
                <div class="space-y-4">
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Select Student</label>
                        <select id="punish-student" class="w-full bg-slate-50 border border-slate-200 p-3.5 rounded-2xl text-sm font-medium text-slate-800 outline-none focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500 transition-all">
                            <option value="sunitha">Sunitha</option>
                            <option value="pranavi">Pranavi</option>
                            <option value="hasini">Hasini</option>
                            <option value="kanchana">Kanchana</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-1.5">Pass Key</label>
                        <input id="punish-passkey" type="password" placeholder="Enter your pass key" class="w-full bg-slate-50 border border-slate-200 p-3.5 rounded-2xl text-sm outline-none focus:ring-2 focus:ring-rose-500/20 focus:border-rose-500 transition-all shadow-inner">
                    </div>
                    <button onclick="verifyStudentPunishments()" class="w-full bg-gradient-to-r from-rose-500 to-red-600 text-white py-3.5 rounded-2xl font-bold hover:from-rose-600 hover:to-red-700 transition shadow-lg shadow-rose-200 active:scale-95 text-sm">Access Punishments</button>
                </div>
            `;
        }

        function verifyStudentPunishments() {
            const studentKey = document.getElementById('punish-student').value;
            const enteredKey = document.getElementById('punish-passkey').value;
            const studentData = studentPunishments[studentKey];

            if (enteredKey === studentData.passkey) {
                showStudentPunishmentsView(studentData);
            } else {
                const passInput = document.getElementById('punish-passkey');
                passInput.value = "";
                passInput.placeholder = "Incorrect Pass Key!";
                passInput.classList.add('border-red-300', 'bg-red-50');
            }
        }

        function showStudentPunishmentsView(data) {
            document.getElementById('home-wrapper').classList.add('hidden');
            document.getElementById('main-content').classList.add('hidden');
            document.getElementById('breadcrumb').classList.remove('hidden');
            document.getElementById('quiz-header-btn').classList.add('hidden');
            closeModal();

            document.getElementById('page-title').innerText = `${data.name}'s Punishments`;
            document.getElementById('page-subtitle').innerText = "Assigned corrective tasks from English Communication and Python subjects.";

            const grid = document.getElementById('resource-grid');
            grid.innerHTML = data.punishments.map((p, index) => `
                <div class="card bg-white p-6 sm:p-8 rounded-[2rem] border border-rose-100 shadow-xl shadow-rose-50/50 flex flex-col justify-between relative overflow-hidden group">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-rose-50 rounded-full blur-2xl -mr-10 -mt-10 group-hover:bg-rose-100 transition-all"></div>
                    <div class="relative z-10">
                        <div class="flex items-center justify-between mb-4">
                            <span class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full bg-rose-50 text-rose-600 text-[10px] font-bold uppercase tracking-wider border border-rose-100">
                                <span class="w-1.5 h-1.5 rounded-full bg-rose-500 animate-ping"></span>
                                Task 0${index + 1} • ${p.subject}
                            </span>
                            <span class="text-[10px] font-bold text-amber-600 bg-amber-50 px-2.5 py-1 rounded-full border border-amber-100">⚠️ Pending</span>
                        </div>
                        <h3 class="font-black text-lg sm:text-xl text-slate-900 mb-3 tracking-tight">${p.subject} Assignment</h3>
                        <p class="text-sm text-slate-600 leading-relaxed bg-slate-50 p-4 rounded-2xl border border-slate-100">${p.task}</p>
                    </div>
                    <div class="relative z-10 mt-6 pt-4 border-t border-slate-100 flex items-center justify-between text-xs font-bold text-slate-400">
                        <span>Due: Next Session</span>
                        <span class="text-rose-600 flex items-center gap-1">Complete & Submit →</span>
                    </div>
                </div>
            `).join('');
        }

        function showAddForm() {
            document.getElementById('modal-content').innerHTML = `
                <div class="text-center mb-6">
                    <h3 class="text-xl font-extrabold text-slate-900">Add Learning Resource</h3>
                    <p class="text-xs text-slate-500 mt-1">Publish new study material or quiz link.</p>
                </div>
                <div class="space-y-3">
                    <input id="title" type="text" placeholder="Resource Title (e.g. Day 7 - Python)" class="w-full bg-slate-50 border border-slate-200 p-3.5 rounded-2xl text-sm outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 shadow-inner">
                    <input id="url" type="url" placeholder="Resource URL or PDF Link" class="w-full bg-slate-50 border border-slate-200 p-3.5 rounded-2xl text-sm outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 shadow-inner">
                    <select id="category" class="w-full bg-slate-50 border border-slate-200 p-3.5 rounded-2xl text-sm outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 font-medium text-slate-700 mb-2">
                        <option value="Python">Python</option>
                        <option value="DSA">DSA</option>
                        <option value="Aptitude">Aptitude</option>
                        <option value="Quiz-Python">Quiz-Python</option>
                        <option value="Quiz-DSA">Quiz-DSA</option>
                    </select>
                    <button onclick="addResource()" class="w-full bg-emerald-600 text-white py-3.5 rounded-2xl font-bold hover:bg-emerald-700 transition shadow-lg shadow-emerald-200 active:scale-95 text-sm mt-2">Save & Publish</button>
                </div>
            `;
        }
        
        function addResource() {
            const title = document.getElementById('title').value;
            const url = document.getElementById('url').value;
            const category = document.getElementById('category').value;
            if(title && url) {
                resources.push({title, url, category});
                saveResources();
                closeModal();
                filterByCategory(category);
            }
        }
    </script>
</body>
</html>
