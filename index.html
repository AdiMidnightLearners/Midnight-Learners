<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learning Hub | Secure Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-40">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 py-4 flex flex-wrap justify-between items-center gap-3">
            <h1 class="text-xl font-bold tracking-tight text-indigo-600 cursor-pointer" onclick="resetToHome()">MidnightBuilders</h1>
            
            <div class="flex-1 w-full order-3 md:order-2 max-w-sm">
                <input id="search-input" type="text" oninput="performSearch(this.value)" placeholder="Search resources..." class="w-full bg-slate-100 border border-slate-200 rounded-full py-2 px-4 focus:outline-none focus:ring-2 focus:ring-indigo-500 text-sm">
            </div>

            <button onclick="checkAccess()" class="order-2 md:order-3 bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-indigo-700 transition">Add Resource</button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 sm:px-6 py-8">

        <section class="mb-12">
            <div class="relative bg-slate-900 rounded-3xl p-10 shadow-2xl overflow-hidden flex flex-col md:flex-row items-center justify-between gap-6">
                <!-- Abstract background glow -->
                <div class="absolute -top-12 -right-12 w-48 h-48 bg-indigo-600 rounded-full blur-3xl opacity-30"></div>
                <div class="absolute -bottom-12 -left-12 w-48 h-48 bg-purple-600 rounded-full blur-3xl opacity-30"></div>
                
                <div class="relative z-10">
                    <span class="text-indigo-400 font-bold tracking-[0.2em] uppercase text-[10px] mb-2 block">Performer of the Week</span>
                    <h2 class="text-white text-3xl font-bold tracking-tight">Excellence in Action</h2>
                </div>

                <div class="relative z-10 flex flex-col items-center md:items-end">
                    <span class="text-slate-400 text-xs font-medium uppercase tracking-wider mb-1">Current Leader</span>
                    <div class="text-5xl md:text-6xl font-black text-transparent bg-clip-text bg-gradient-to-r from-yellow-300 via-amber-400 to-orange-500 tracking-tighter drop-shadow-lg">
                        Hasini
                    </div>
                </div>
            </div>
        </section>

        <header class="mb-8">
            <div id="breadcrumb" class="hidden mb-2">
                <button onclick="resetToHome()" class="text-indigo-600 text-sm font-semibold hover:underline">← Back to All</button>
            </div>
            <h2 id="page-title" class="text-3xl sm:text-4xl font-extrabold text-slate-900 mb-2">Subject Library</h2>
            <p id="page-subtitle" class="text-slate-600 text-sm sm:text-base">Select a subject or task to explore materials.</p>
        </header>

        <div id="main-content" class="space-y-8">
            <div class="grid grid-cols-2 md:grid-cols-3 gap-4">
                <div onclick="filterByCategory('Python')" class="cursor-pointer bg-white p-6 rounded-xl border border-slate-200 shadow-sm hover:border-indigo-300 transition text-center">
                    <h3 class="text-lg font-bold text-slate-800">Python</h3>
                </div>
                <div onclick="filterByCategory('DSA')" class="cursor-pointer bg-white p-6 rounded-xl border border-slate-200 shadow-sm hover:border-indigo-300 transition text-center">
                    <h3 class="text-lg font-bold text-slate-800">DSA</h3>
                </div>
                <div onclick="filterByCategory('Aptitude')" class="cursor-pointer bg-white p-6 rounded-xl border border-slate-200 shadow-sm hover:border-indigo-300 transition text-center">
                    <h3 class="text-lg font-bold text-slate-800">Aptitude</h3>
                </div>
            </div>
            <div class="border-t pt-8">
                <h3 class="text-xl font-bold text-slate-800 mb-4">Practice Tasks</h3>
                <div onclick="filterByCategory('Quiz')" class="cursor-pointer bg-indigo-50 border-2 border-dashed border-indigo-200 p-6 rounded-xl hover:bg-indigo-100 transition">
                    <h3 class="text-lg font-bold text-indigo-700">Daily Quizzes</h3>
                    <p class="text-sm text-indigo-600">Access all past and current topic quizzes here.</p>
                </div>
            </div>
        </div>

        <div id="resource-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </main>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl p-6 sm:p-8 w-full max-w-sm shadow-2xl relative">
            <button onclick="closeModal()" class="absolute top-3 right-3 p-2 text-slate-400 hover:text-slate-600">&times;</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        let resources = JSON.parse(localStorage.getItem('hub_resources')) || [
            { title: "Day 1 - Python", url: "https://github.com/AdiMidnightLearners/Midnight-Learners/raw/main/day%201.pdf", category: "Python" },
            { title: "Day 2 - Python", url: "https://github.com/AdiMidnightLearners/Midnight-Learners/raw/main/day%202.pdf", category: "Python" },
            { title: "Day 3 - Python", url: "https://github.com/AdiMidnightLearners/Midnight-Learners/raw/main/day%203.pdf", category: "Python" },
            { title: "Day 4 - Python", url: "https://github.com/AdiMidnightLearners/Midnight-Learners/raw/main/day%204.pdf", category: "Python" },
            { title: "Day 5 - Python", url: "https://github.com/AdiMidnightLearners/Midnight-Learners/raw/main/day%205.pdf", category: "Python" },
            { title: "Day 6 - Python", url: "https://github.com/AdiMidnightLearners/Midnight-Learners/raw/main/day%206.pdf", category: "Python" },
            { title: "Day 1 - DSA ", url: "https://github.com/AdiMidnightLearners/Midnight-Learners/raw/main/dsa%20day%201.pdf", category: "DSA" },
            { title: "DSA Day 01 Quiz", url: "https://adimidnightlearners.github.io/Midnight-Learners/DAY%2001%20DSA%20QUIZ.html", category: "Quiz" },
            { title: "Python Day 01 Quiz", url: "https://adimidnightlearners.github.io/Midnight-Learners/PYTHON%20DAY%2001%20QUIZ.html", category: "Quiz" },
            { title: "Python Day 02 Quiz", url: "https://adimidnightlearners.github.io/Midnight-Learners/PYTHON%20DAY%2002%20QUIZ.html", category: "Quiz" },
            { title: "Python Day 03 Quiz", url: "https://adimidnightlearners.github.io/Midnight-Learners/PYTHON%20DAY%2003%20QUIZ.html", category: "Quiz" },
            { title: "Python Day 04 Quiz", url: "https://adimidnightlearners.github.io/Midnight-Learners/PYTHON%20DAY%2004%20QUIZ.html", category: "Quiz" },
            { title: "Python Day 05 Quiz", url: "https://adimidnightlearners.github.io/Midnight-Learners/PYTHON%20DAY%2005%20QUIZ.html", category: "Quiz" },
            { title: "Python Day 06 Quiz", url: "https://adimidnightlearners.github.io/Midnight-Learners/PYTHON%20DAY%2006%20QUIZ.html", category: "Quiz" }
        ];

        function saveResources() { localStorage.setItem('hub_resources', JSON.stringify(resources)); }

        function resetToHome() {
            document.getElementById('page-title').innerText = "Subject Library";
            document.getElementById('page-subtitle').innerText = "Select a subject or task to explore all materials.";
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('breadcrumb').classList.add('hidden');
            document.getElementById('resource-grid').innerHTML = '';
            document.getElementById('search-input').value = '';
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        function performSearch(query) {
            const filtered = resources.filter(r => r.title.toLowerCase().includes(query.toLowerCase()));
            document.getElementById('main-content').classList.add('hidden');
            document.getElementById('breadcrumb').classList.remove('hidden');
            renderResources(filtered, "Search Results", `Found ${filtered.length} matches`);
        }

        function filterByCategory(cat) {
            document.getElementById('main-content').classList.add('hidden');
            document.getElementById('breadcrumb').classList.remove('hidden');
            const filtered = resources.filter(r => r.category === cat);
            renderResources(filtered, cat, `Materials for ${cat}`);
        }

        function renderResources(items, title, subtitle) {
            document.getElementById('page-title').innerText = title;
            document.getElementById('page-subtitle').innerText = subtitle;
            const grid = document.getElementById('resource-grid');
            
            grid.innerHTML = items.length > 0 ? items.map(res => {
                const isPdf = res.url.toLowerCase().endsWith('.pdf');
                const targetUrl = isPdf ? `https://docs.google.com/viewer?url=${encodeURIComponent(res.url)}&embedded=true` : res.url;
                return `
                    <div class="bg-white p-5 rounded-xl border border-slate-100 shadow-sm">
                        <span class="text-[10px] uppercase font-bold text-indigo-500">${res.category}</span>
                        <h3 class="font-bold text-md mb-3 text-slate-900">${res.title}</h3>
                        <a href="${targetUrl}" target="_blank" class="text-indigo-600 font-semibold text-xs uppercase tracking-wider hover:underline">Open File →</a>
                    </div>
                `;
            }).join('') : `<p class="col-span-full text-slate-500">No resources found.</p>`;
        }

        function checkAccess() {
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal-content').innerHTML = `
                <h3 class="text-xl font-bold mb-4">Enter Access Key</h3>
                <input id="passkey" type="password" placeholder="Enter key..." class="w-full p-3 border rounded-lg mb-4">
                <button onclick="verifyKey()" class="w-full bg-indigo-600 text-white py-2 rounded-lg font-bold">Verify</button>
            `;
        }

        function verifyKey() {
            if(document.getElementById('passkey').value === "adi105") {
                showAddForm();
            } else {
                document.getElementById('passkey').placeholder = "Incorrect Key!";
                document.getElementById('passkey').value = "";
            }
        }

        function showAddForm() {
            document.getElementById('modal-content').innerHTML = `
                <h3 class="text-xl font-bold mb-4">Add Material / Quiz</h3>
                <input id="title" type="text" placeholder="Title" class="w-full p-3 border mb-3 rounded-lg text-sm">
                <input id="url" type="url" placeholder="Paste Link to PDF/HTML file" class="w-full p-3 border mb-3 rounded-lg text-sm">
                <select id="category" class="w-full p-3 border mb-3 rounded-lg text-sm">
                    <option value="Python">Python</option>
                    <option value="DSA">DSA</option>
                    <option value="Aptitude">Aptitude</option>
                    <option value="Quiz">Quiz</option>
                </select>
                <button onclick="addResource()" class="w-full bg-green-600 text-white py-2 rounded-lg font-bold text-sm">Add Item</button>
            `;
        }

        function addResource() {
            const title = document.getElementById('title').value;
            const url = document.getElementById('url').value;
            const category = document.getElementById('category').value;
            if(title && url) {
                resources.push({title, url, category});
                saveResources();
                closeModal();
                filterByCategory(category);
            }
        }
    </script>
</body>
</html>
