<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MidnightBuilders | Premium Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(226, 232, 240, 0.8); }
        .card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card:hover { transform: translateY(-2px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="text-slate-900 min-h-screen">

    <nav class="glass sticky top-0 z-50">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-2 cursor-pointer" onclick="resetToHome()">
                <div class="w-8 h-8 rounded-xl bg-indigo-600 flex items-center justify-center font-bold text-white shadow-lg shadow-indigo-200">M</div>
                <h1 class="text-lg font-bold tracking-tight text-slate-900 hidden sm:block">Midnight<span class="text-indigo-600">Builders</span></h1>
            </div>
            
            <div class="flex items-center gap-2 sm:gap-6">
                <input id="search-input" type="text" oninput="performSearch(this.value)" placeholder="Search..." class="bg-white border border-slate-200 rounded-full py-2 px-4 focus:outline-none focus:ring-2 focus:ring-indigo-100 transition-all text-sm w-32 sm:w-64 shadow-inner">
                <button onclick="checkAccess()" class="bg-slate-900 text-white px-4 py-2 rounded-full text-xs sm:text-sm font-semibold hover:bg-slate-800 transition-all shadow-lg active:scale-95">Add</button>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 sm:px-6 py-8 sm:py-12">
        
        <section id="performer-section" class="mb-12 sm:mb-16">
            <div class="bg-slate-900 rounded-[2rem] p-6 sm:p-8 shadow-2xl flex flex-col md:flex-row items-start md:items-center justify-between gap-6">
                <div>
                    <div class="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-slate-800 text-slate-300 text-[10px] font-bold uppercase tracking-widest mb-3">
                        <span class="w-1.5 h-1.5 rounded-full bg-indigo-400 animate-pulse"></span>
                        Performer of the week
                    </div>
                    <h2 class="text-2xl sm:text-3xl font-extrabold text-white tracking-tight">Excellence in Action</h2>
                </div>
                <div class="text-left md:text-right border-l-4 border-indigo-500 pl-4 md:border-l-0 md:pl-0">
                    <p class="text-slate-500 text-[10px] uppercase tracking-widest font-bold">Current Leader</p>
                    <p class="text-3xl font-black text-white">Hasini</p>
                </div>
            </div>
        </section>

        <header class="mb-8">
            <button id="breadcrumb" onclick="resetToHome()" class="hidden mb-4 flex items-center gap-1.5 text-indigo-600 font-semibold text-sm hover:translate-x-[-4px] transition-transform">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                Back
            </button>
            <div class="flex items-center justify-between gap-4">
                <h2 id="page-title" class="text-2xl sm:text-4xl font-extrabold text-slate-900 tracking-tight">Subject Library</h2>
                <button id="quiz-header-btn" onclick="showQuizSubjects()" class="bg-indigo-50 text-indigo-700 px-4 py-2 rounded-full font-bold text-xs sm:text-sm hover:bg-indigo-100 transition-all border border-indigo-100 flex items-center gap-2">
                    <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                    Quizzes
                </button>
            </div>
            <p id="page-subtitle" class="text-slate-500 mt-2 text-sm sm:text-lg">Select a category to browse materials.</p>
        </header>

        <div id="main-content" class="space-y-8 sm:space-y-12">
            <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
                <div onclick="filterByCategory('Python')" class="card cursor-pointer bg-white p-3 sm:p-4 rounded-xl sm:rounded-2xl border border-slate-200 shadow-sm flex items-center gap-3">
                    <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-lg sm:rounded-xl bg-indigo-50 flex items-center justify-center text-indigo-600 font-bold text-xs shrink-0">PY</div>
                    <h3 class="text-xs sm:text-sm font-bold text-slate-900 truncate">Python</h3>
                </div>
                <div onclick="filterByCategory('DSA')" class="card cursor-pointer bg-white p-3 sm:p-4 rounded-xl sm:rounded-2xl border border-slate-200 shadow-sm flex items-center gap-3">
                    <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-lg sm:rounded-xl bg-emerald-50 flex items-center justify-center text-emerald-600 font-bold text-xs shrink-0">DS</div>
                    <h3 class="text-xs sm:text-sm font-bold text-slate-900 truncate">DSA</h3>
                </div>
                <div onclick="filterByCategory('Aptitude')" class="card cursor-pointer bg-white p-3 sm:p-4 rounded-xl sm:rounded-2xl border border-slate-200 shadow-sm flex items-center gap-3">
                    <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-lg sm:rounded-xl bg-orange-50 flex items-center justify-center text-orange-600 font-bold text-xs shrink-0">AT</div>
                    <h3 class="text-xs sm:text-sm font-bold text-slate-900 truncate">Aptitude</h3>
                </div>
                <div onclick="filterByCategory('Power BI')" class="card cursor-pointer bg-white p-3 sm:p-4 rounded-xl sm:rounded-2xl border border-slate-200 shadow-sm flex items-center gap-3">
                    <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-lg sm:rounded-xl bg-indigo-50 flex items-center justify-center text-indigo-600 font-bold text-xs shrink-0">PB</div>
                    <h3 class="text-xs sm:text-sm font-bold text-slate-900 truncate">Power BI</h3>
                </div>
                <div onclick="filterByCategory('ML')" class="card cursor-pointer bg-white p-3 sm:p-4 rounded-xl sm:rounded-2xl border border-slate-200 shadow-sm flex items-center gap-3">
                    <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-lg sm:rounded-xl bg-emerald-50 flex items-center justify-center text-emerald-600 font-bold text-xs shrink-0">ML</div>
                    <h3 class="text-xs sm:text-sm font-bold text-slate-900 truncate">ML</h3>
                </div>
                <div onclick="filterByCategory('AI')" class="card cursor-pointer bg-white p-3 sm:p-4 rounded-xl sm:rounded-2xl border border-slate-200 shadow-sm flex items-center gap-3">
                    <div class="w-8 h-8 sm:w-10 sm:h-10 rounded-lg sm:rounded-xl bg-orange-50 flex items-center justify-center text-orange-600 font-bold text-xs shrink-0">AI</div>
                    <h3 class="text-xs sm:text-sm font-bold text-slate-900 truncate">AI</h3>
                </div>
            </div>
        </div>

        <div id="resource-grid" class="grid grid-cols-2 lg:grid-cols-3 gap-3 sm:gap-6"></div>
    </main>

    <div id="modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-[60]">
        <div class="bg-white rounded-[2rem] p-6 sm:p-8 w-full max-w-sm shadow-2xl relative">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-400 hover:text-slate-900 transition">✕</button>
            <div id="modal-content"></div>
        </div>
    </div>

    <script>
        let resources = JSON.parse(localStorage.getItem('hub_resources')) || [
            { title: "Day 1 - Python", url: "https://github.com/AdiMidnightLearners/Midnight-Learners/raw/main/day%201.pdf", category: "Python" },
            { title: "Day 2 - Python", url: "https://github.com/AdiMidnightLearners/Midnight-Learners/raw/main/day%202.pdf", category: "Python" },
            { title: "Day 3 - Python", url: "https://github.com/AdiMidnightLearners/Midnight-Learners/raw/main/day%203.pdf", category: "Python" },
            { title: "Day 4 - Python", url: "https://github.com/AdiMidnightLearners/Midnight-Learners/raw/main/day%204.pdf", category: "Python" },
            { title: "Day 5 - Python", url: "https://github.com/AdiMidnightLearners/Midnight-Learners/raw/main/day%205.pdf", category: "Python" },
            { title: "Day 6 - Python", url: "https://github.com/AdiMidnightLearners/Midnight-Learners/raw/main/day%206.pdf", category: "Python" },
            { title: "Day 1 - DSA", url: "https://github.com/AdiMidnightLearners/Midnight-Learners/raw/main/dsa%20day%201.pdf", category: "DSA" },
            { title: "DSA Day 01 Quiz", url: "https://adimidnightlearners.github.io/Midnight-Learners/DAY%2001%20DSA%20QUIZ.html", category: "Quiz-DSA" },
            { title: "Python Day 01 Quiz", url: "https://adimidnightlearners.github.io/Midnight-Learners/PYTHON%20DAY%2001%20QUIZ.html", category: "Quiz-Python" },
            { title: "Python Day 02 Quiz", url: "https://adimidnightlearners.github.io/Midnight-Learners/PYTHON%20DAY%2002%20QUIZ.html", category: "Quiz-Python" },
            { title: "Python Day 03 Quiz", url: "https://adimidnightlearners.github.io/Midnight-Learners/PYTHON%20DAY%2003%20QUIZ.html", category: "Quiz-Python" },
            { title: "Python Day 04 Quiz", url: "https://adimidnightlearners.github.io/Midnight-Learners/PYTHON%20DAY%2004%20QUIZ.html", category: "Quiz-Python" },
            { title: "Python Day 05 Quiz", url: "https://adimidnightlearners.github.io/Midnight-Learners/PYTHON%20DAY%2005%20QUIZ.HTML", category: "Quiz-Python" },
            { title: "Python Day 06 Quiz", url: "https://adimidnightlearners.github.io/Midnight-Learners/PYTHON%20DAY%2006%20QUIZ.html", category: "Quiz-Python" }
        ];

        function saveResources() { localStorage.setItem('hub_resources', JSON.stringify(resources)); }

        function resetToHome() {
            document.getElementById('performer-section').classList.remove('hidden');
            document.getElementById('page-title').innerText = "Subject Library";
            document.getElementById('page-subtitle').innerText = "Select a category to browse materials.";
            document.getElementById('main-content').classList.remove('hidden');
            document.getElementById('breadcrumb').classList.add('hidden');
            document.getElementById('resource-grid').innerHTML = '';
            document.getElementById('search-input').value = '';
            document.getElementById('quiz-header-btn').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        function performSearch(query) {
            document.getElementById('performer-section').classList.add('hidden');
            document.getElementById('quiz-header-btn').classList.add('hidden');
            const filtered = resources.filter(r => r.title.toLowerCase().includes(query.toLowerCase()));
            document.getElementById('main-content').classList.add('hidden');
            document.getElementById('breadcrumb').classList.remove('hidden');
            renderResources(filtered, "Search Results", `Found ${filtered.length} matches`);
        }

        function showQuizSubjects() {
            document.getElementById('performer-section').classList.add('hidden');
            document.getElementById('quiz-header-btn').classList.add('hidden');
            document.getElementById('main-content').classList.add('hidden');
            document.getElementById('breadcrumb').classList.remove('hidden');
            document.getElementById('page-title').innerText = "Quiz Subjects";
            document.getElementById('page-subtitle').innerText = "Select a subject to view its quizzes.";
            
            const subjects = ["Python", "DSA", "Aptitude", "Power BI", "ML", "AI"];
            const grid = document.getElementById('resource-grid');
            grid.innerHTML = subjects.map(s => `
                <div onclick="filterByCategory('Quiz-${s}')" class="card cursor-pointer bg-white p-6 rounded-2xl border border-slate-200 shadow-sm text-center">
                    <h3 class="font-bold text-lg">${s}</h3>
                </div>
            `).join('');
        }

        function filterByCategory(cat) {
            document.getElementById('performer-section').classList.add('hidden');
            document.getElementById('quiz-header-btn').classList.add('hidden');
            document.getElementById('main-content').classList.add('hidden');
            document.getElementById('breadcrumb').classList.remove('hidden');
            const filtered = resources.filter(r => r.category === cat);
            renderResources(filtered, cat.replace('Quiz-', ''), `Showing materials for ${cat.replace('Quiz-', '')}`);
        }

        function renderResources(items, title, subtitle) {
            document.getElementById('page-title').innerText = title;
            document.getElementById('page-subtitle').innerText = subtitle;
            const grid = document.getElementById('resource-grid');
            
            grid.innerHTML = items.length > 0 ? items.map(res => {
                const isPdf = res.url.toLowerCase().endsWith('.pdf');
                const targetUrl = isPdf ? `https://docs.google.com/viewer?url=${encodeURIComponent(res.url)}&embedded=true` : res.url;
                return `
                    <div class="card bg-white p-4 sm:p-6 rounded-2xl sm:rounded-3xl border border-slate-100 shadow-sm flex flex-col justify-between">
                        <div>
                            <span class="text-[9px] font-bold text-indigo-500 uppercase tracking-widest">${res.category.replace('Quiz-', '')}</span>
                            <h3 class="font-bold text-sm sm:text-lg mt-1 sm:mt-2 text-slate-900 line-clamp-2">${res.title}</h3>
                        </div>
                        <a href="${targetUrl}" target="_blank" class="mt-4 sm:mt-6 flex items-center gap-1 sm:gap-2 text-indigo-600 font-bold text-[10px] sm:text-xs uppercase tracking-wider hover:text-indigo-800 transition">
                            View →
                        </a>
                    </div>
                `;
            }).join('') : `<p class="col-span-full text-slate-500 py-12">No materials found in this category.</p>`;
        }

        function checkAccess() {
            document.getElementById('modal').classList.remove('hidden');
            document.getElementById('modal-content').innerHTML = `
                <h3 class="text-xl font-bold mb-6 text-slate-900">Access Restricted</h3>
                <input id="passkey" type="password" placeholder="Enter security key" class="w-full bg-slate-50 border border-slate-200 p-4 rounded-2xl mb-4 text-slate-900 outline-none focus:ring-2 focus:ring-indigo-100">
                <button onclick="verifyKey()" class="w-full bg-indigo-600 text-white py-3 rounded-xl font-bold hover:bg-indigo-700 transition active:scale-95">Verify</button>
            `;
        }

        function verifyKey() {
            if(document.getElementById('passkey').value === "adi105") {
                showAddForm();
            } else {
                document.getElementById('passkey').value = "";
                document.getElementById('passkey').placeholder = "Invalid Key!";
            }
        }

        function showAddForm() {
            document.getElementById('modal-content').innerHTML = `
                <h3 class="text-xl font-bold mb-6 text-slate-900">Add Resource</h3>
                <input id="title" type="text" placeholder="Title" class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl mb-3 text-sm">
                <input id="url" type="url" placeholder="URL" class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl mb-3 text-sm">
                <select id="category" class="w-full bg-slate-50 border border-slate-200 p-3 rounded-xl mb-6 text-sm">
                    <option value="Python">Python</option>
                    <option value="DSA">DSA</option>
                    <option value="Aptitude">Aptitude</option>
                    <option value="Quiz-Python">Quiz-Python</option>
                    <option value="Quiz-DSA">Quiz-DSA</option>
                </select>
                <button onclick="addResource()" class="w-full bg-emerald-600 text-white py-3 rounded-xl font-bold hover:bg-emerald-700 transition">Save</button>
            `;
        }

        function addResource() {
            const title = document.getElementById('title').value;
            const url = document.getElementById('url').value;
            const category = document.getElementById('category').value;
            if(title && url) {
                resources.push({title, url, category});
                saveResources();
                closeModal();
                filterByCategory(category);
            }
        }
    </script>
</body>
</html>
