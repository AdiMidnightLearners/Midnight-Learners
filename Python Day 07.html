<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Day 07 - Strings Mastery Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex items-center justify-center p-4">

<div id="app" class="w-full max-w-2xl bg-white shadow-xl rounded-3xl p-6 md:p-10">
    <!-- Landing View -->
    <div id="landing" class="text-center">
        <h1 class="text-4xl font-bold mb-4 text-indigo-600">Python Day 07 Quiz</h1>
        <p class="text-slate-500 mb-8">Test your knowledge on String Methods and Operations.</p>
        <input type="text" id="username" placeholder="Enter your name" class="w-full p-4 border border-slate-200 rounded-xl mb-6 focus:ring-2 focus:ring-indigo-500 outline-none">
        <button onclick="startQuiz()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-semibold hover:bg-indigo-700 transition">Begin Quiz</button>
    </div>

    <!-- Quiz View -->
    <div id="quiz" class="hidden">
        <div class="flex justify-between items-center mb-6">
            <span id="progress" class="text-xs font-semibold text-indigo-600 uppercase tracking-widest"></span>
            <span id="userNameDisplay" class="text-xs text-slate-400 font-medium"></span>
        </div>
        <h2 id="question" class="text-lg font-semibold mb-6 text-slate-800"></h2>
        <div id="options" class="space-y-2 mb-6"></div>
        
        <!-- Navigation Controls -->
        <div class="flex justify-between items-center pt-4 border-t border-slate-100">
            <button id="prevBtn" onclick="prevQuestion()" class="px-4 py-2 bg-slate-100 text-slate-600 rounded-lg text-sm font-semibold hover:bg-slate-200 transition disabled:opacity-50 disabled:cursor-not-allowed">Previous</button>
            <div id="navRight">
                <button id="nextBtn" onclick="nextQuestion()" class="px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm font-semibold hover:bg-indigo-700 transition">Next</button>
                <button id="submitBtn" onclick="showResult()" class="hidden px-6 py-2 bg-green-600 text-white rounded-lg text-sm font-semibold hover:bg-green-700 transition disabled:opacity-50 disabled:cursor-not-allowed" disabled>Submit Quiz</button>
            </div>
        </div>
    </div>

    <!-- Result View -->
    <div id="result" class="hidden text-center">
        <h2 class="text-2xl font-bold mb-1">Quiz Complete!</h2>
        <h3 id="reportName" class="text-sm font-medium text-slate-400 mb-4"></h3>
        <p id="scoreDisplay" class="text-4xl font-bold text-indigo-600 mb-6"></p>
        <div id="report" class="text-left space-y-2 text-xs max-h-96 overflow-y-auto pr-1"></div>
    </div>
</div>

<script>
    const questions = [
        { 
            q: "What does the strip() string method do?", 
            options: ["Removes left spaces only", "Removes right spaces only", "Spaces removed starting or ending", "Replaces words in string"], 
            a: 2 
        },
        { 
            q: "Which string method is used to convert uppercase letters to lowercase?", 
            options: ["lower()", "upper()", "capitalize()", "title()"], 
            a: 0 
        },
        { 
            q: "What does lstrip() remove?", 
            options: ["Right spaces", "Left spaces", "Both starting and ending spaces", "All spaces inside string"], 
            a: 1 
        },
        { 
            q: "Which method is used to convert a list into a string?", 
            options: ["split()", "find()", "join()", "replace()"], 
            a: 2 
        },
        { 
            q: "What does the find() method do?", 
            options: ["Replaces characters", "Finds a specific element index", "Checks start value", "Removes spaces"], 
            a: 1 
        },
        { 
            q: "What does startswith() check and return?", 
            options: ["Checks if it ends with a value", "Checks and returns True if it starts with given value", "Converts string to list", "Converts case"], 
            a: 1 
        },
        { 
            q: "What is the opposite function to startswith()?", 
            options: ["strip()", "find()", "endswith()", "split()"], 
            a: 2 
        },
        { 
            q: "How does the split() method transform a string?", 
            options: ["Strings disconnected into list", "List combined into string", "Spaces removed", "Uppercase converted to lowercase"], 
            a: 0 
        },
        { 
            q: "If text = 'python program', what will text.capitalize() output?", 
            options: ["PYTHON PROGRAM", "Python program", "Python Program", "python program"], 
            a: 1 
        },
        { 
            q: "What does the title() method return for 'python programming'?", 
            options: ["Python programming", "PYTHON PROGRAMMING", "Python Programming", "python programming"], 
            a: 2 
        }
    ];

    let currentQ = 0;
    let userAnswers = new Array(questions.length).fill(null);
    let userName = "";

    function startQuiz() {
        userName = document.getElementById('username').value.trim();
        if (!userName) {
            // Using a custom visual cue instead of alert()
            document.getElementById('username').classList.add('border-red-500', 'ring-2', 'ring-red-200');
            return;
        }
        document.getElementById('userNameDisplay').innerText = userName;
        document.getElementById('landing').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        renderQuestion();
    }

    function renderQuestion() {
        const qData = questions[currentQ];
        document.getElementById('progress').innerText = `Question ${currentQ + 1} of ${questions.length}`;
        document.getElementById('question').innerText = qData.q;
        
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        
        qData.options.forEach((opt, idx) => {
            const isSelected = userAnswers[currentQ] === idx;
            const btn = document.createElement('button');
            btn.className = `w-full text-left p-3 rounded-lg border transition text-sm ${isSelected ? 'border-indigo-600 bg-indigo-50 font-medium text-indigo-900' : 'border-slate-100 hover:border-indigo-300 hover:bg-indigo-50 text-slate-700'}`;
            btn.innerText = opt;
            btn.onclick = () => selectAnswer(idx);
            optionsDiv.appendChild(btn);
        });

        // Navigation visibility
        document.getElementById('prevBtn').disabled = currentQ === 0;
        
        const nextBtn = document.getElementById('nextBtn');
        const submitBtn = document.getElementById('submitBtn');

        if (currentQ === questions.length - 1) {
            nextBtn.classList.add('hidden');
            submitBtn.classList.remove('hidden');
            checkSubmitAvailability();
        } else {
            nextBtn.classList.remove('hidden');
            submitBtn.classList.add('hidden');
        }
    }

    function selectAnswer(idx) {
        userAnswers[currentQ] = idx;
        renderQuestion();
        checkSubmitAvailability();
    }

    function prevQuestion() {
        if (currentQ > 0) {
            currentQ--;
            renderQuestion();
        }
    }

    function nextQuestion() {
        if (currentQ < questions.length - 1) {
            currentQ++;
            renderQuestion();
        }
    }

    function checkSubmitAvailability() {
        const allAnswered = userAnswers.every(ans => ans !== null);
        const submitBtn = document.getElementById('submitBtn');
        if (allAnswered) {
            submitBtn.removeAttribute('disabled');
        } else {
            submitBtn.setAttribute('disabled', 'true');
        }
    }

    function showResult() {
        const allAnswered = userAnswers.every(ans => ans !== null);
        if (!allAnswered) return;

        let score = 0;
        userAnswers.forEach((ans, i) => {
            if (ans === questions[i].a) score++;
        });

        document.getElementById('quiz').classList.add('hidden');
        document.getElementById('result').classList.remove('hidden');
        document.getElementById('reportName').innerText = `Report for ${userName}`;
        document.getElementById('scoreDisplay').innerText = `${score} / ${questions.length}`;
        
        const report = document.getElementById('report');
        report.innerHTML = '';
        
        userAnswers.forEach((ans, i) => {
            const isCorrect = ans === questions[i].a;
            const div = document.createElement('div');
            div.className = `p-2.5 rounded-md ${isCorrect ? 'bg-green-50' : 'bg-red-50'}`;
            div.innerHTML = `<p class="font-semibold text-slate-800">${i + 1}. ${questions[i].q}</p>
                             <p class="mt-1 ${isCorrect ? 'text-green-700 font-medium' : 'text-red-700'}">
                             Your Answer: ${questions[i].options[ans]} <br>
                             ${isCorrect ? 'Correct!' : 'Correct Answer: ' + questions[i].options[questions[i].a]}</p>`;
            report.appendChild(div);
        });
    }
</script>
</body>
</html>
