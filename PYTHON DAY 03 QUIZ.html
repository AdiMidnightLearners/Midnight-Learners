<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Python Day 3 Quiz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex items-center justify-center p-4">

<div id="app" class="w-full max-w-2xl bg-white shadow-xl rounded-3xl p-6 md:p-10">
    <!-- Landing View -->
    <div id="landing" class="text-center">
        <h1 class="text-4xl font-bold mb-4 text-indigo-600">Python Day 3 Quiz</h1>
        <p class="text-slate-500 mb-8">Test your knowledge of Conditional Statements (if, if-else, elif, nested if).</p>
        <input type="text" id="username" placeholder="Enter your name" class="w-full p-4 border border-slate-200 rounded-xl mb-6 focus:ring-2 focus:ring-indigo-500 outline-none">
        <button onclick="startQuiz()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-semibold hover:bg-indigo-700 transition">Begin Quiz</button>
    </div>

    <!-- Quiz View -->
    <div id="quiz" class="hidden">
        <div class="flex justify-between items-center mb-6">
            <span id="progress" class="text-xs font-semibold text-indigo-600 uppercase tracking-widest"></span>
            <span id="userNameDisplay" class="text-xs text-slate-400 font-medium"></span>
        </div>
        <h2 id="question" class="text-lg font-semibold mb-6 text-slate-800"></h2>
        <div id="options" class="space-y-2"></div>
    </div>

    <!-- Result View -->
    <div id="result" class="hidden text-center">
        <h2 class="text-2xl font-bold text-indigo-600 mb-1">Python Day 3 Quiz</h2>
        <h3 id="reportName" class="text-sm font-medium text-slate-400 mb-4"></h3>
        <p id="scoreDisplay" class="text-4xl font-bold text-slate-900 mb-6"></p>
        <div id="report" class="text-left space-y-2 text-xs"></div>
    </div>
</div>

<script>
    const questions = [
        { q: "What is the primary purpose of conditional statements in Python?", options: ["To repeat code blocks", "To make decisions", "To define functions", "To store data"], a: 1 },
        { q: "What is the correct symbol to check for equality in Python?", options: ["=", "==", "!=", "=>"], a: 1 },
        { q: "Which statement is executed when the condition in an 'if' block is False?", options: ["The next if statement", "The else block", "The loop", "Nothing"], a: 1 },
        { q: "What is used to handle multiple conditions in a single structure?", options: ["if-else", "if-elif-else", "nested if", "single if"], a: 1 },
        { q: "What is a 'nested if'?", options: ["An if inside a loop", "An if inside another if", "An if inside a function", "An if with multiple elifs"], a: 1 },
        { q: "Why is indentation critical in conditional statements?", options: ["To define the code block belonging to the condition", "It is optional", "To increase code speed", "To define variables"], a: 0 },
        { q: "Which operator represents 'not equal to'?", options: ["==", "<>", "!=", "not="], a: 2 },
        { q: "What happens if all conditions in an 'if-elif-else' structure are False?", options: ["The program crashes", "The first if block runs", "The else block runs", "Nothing happens"], a: 2 },
        { q: "What is the result of a condition expression?", options: ["Number", "String", "True or False", "None"], a: 2 },
        { q: "Which operator is used to combine multiple conditions, where both must be True?", options: ["or", "and", "not", "is"], a: 1 },
        { q: "Can an 'else' block contain a condition?", options: ["Yes", "No", "Only if it's an if", "Only in nested if"], a: 1 },
        { q: "What is the purpose of comparison operators?", options: ["To add numbers", "To compare two values", "To assign values", "To print values"], a: 1 }
    ];

    let currentQ = 0, score = 0, userAnswers = [], userName = "";

    function startQuiz() {
        userName = document.getElementById('username').value;
        if (!userName) return alert("Please enter your name!");
        document.getElementById('userNameDisplay').innerText = userName;
        document.getElementById('landing').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        renderQuestion();
    }

    function renderQuestion() {
        const qData = questions[currentQ];
        document.getElementById('progress').innerText = `Question ${currentQ + 1} of ${questions.length}`;
        document.getElementById('question').innerText = qData.q;
        const optionsDiv = document.getElementById('options');
        optionsDiv.innerHTML = '';
        qData.options.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'w-full text-left p-3 rounded-lg border border-slate-100 hover:border-indigo-300 hover:bg-indigo-50 transition text-sm';
            btn.innerText = opt;
            btn.onclick = () => selectAnswer(idx);
            optionsDiv.appendChild(btn);
        });
    }

    function selectAnswer(idx) {
        userAnswers.push({ q: questions[currentQ].q, selected: idx, correct: questions[currentQ].a });
        if (idx === questions[currentQ].a) score++;
        currentQ++;
        if (currentQ < questions.length) renderQuestion();
        else showResult();
    }

    function showResult() {
        document.getElementById('quiz').classList.add('hidden');
        document.getElementById('result').classList.remove('hidden');
        document.getElementById('reportName').innerText = `Results for ${userName}`;
        document.getElementById('scoreDisplay').innerText = `${score} / ${questions.length}`;
        const report = document.getElementById('report');
        userAnswers.forEach((ans, i) => {
            const isCorrect = ans.selected === ans.correct;
            const div = document.createElement('div');
            div.className = `p-2 rounded-md ${isCorrect ? 'bg-green-50' : 'bg-red-50'}`;
            div.innerHTML = `<p class="font-semibold">${i + 1}. ${ans.q}</p>
                             <p class="${isCorrect ? 'text-green-700' : 'text-red-700'}">
                             ${isCorrect ? 'Correct!' : 'Wrong. Correct answer: ' + questions[i].options[ans.correct]}</p>`;
            report.appendChild(div);
        });
    }
</script>
</body>
</html>
